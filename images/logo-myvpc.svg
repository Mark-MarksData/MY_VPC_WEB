<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Icon: connected nodes representing virtual coordination -->
  <g transform="translate(10, 10)">
    <!-- Outer rounded square -->
    <rect x="0" y="0" width="90" height="90" rx="18" fill="url(#iconGrad)"/>

    <!-- Central hub node -->
    <circle cx="45" cy="42" r="12" fill="#fff" opacity=".95"/>
    <circle cx="45" cy="42" r="7" fill="#0d9488"/>

    <!-- Satellite nodes -->
    <circle cx="20" cy="22" r="7" fill="#fff" opacity=".85"/>
    <circle cx="70" cy="22" r="7" fill="#fff" opacity=".85"/>
    <circle cx="20" cy="65" r="7" fill="#fff" opacity=".85"/>
    <circle cx="70" cy="65" r="7" fill="#fff" opacity=".85"/>

    <!-- Connection lines -->
    <line x1="26" y1="26" x2="36" y2="36" stroke="#fff" stroke-width="2" opacity=".6" stroke-linecap="round"/>
    <line x1="64" y1="26" x2="54" y2="36" stroke="#fff" stroke-width="2" opacity=".6" stroke-linecap="round"/>
    <line x1="26" y1="61" x2="36" y2="48" stroke="#fff" stroke-width="2" opacity=".6" stroke-linecap="round"/>
    <line x1="64" y1="61" x2="54" y2="48" stroke="#fff" stroke-width="2" opacity=".6" stroke-linecap="round"/>

    <!-- Checkmark in center -->
    <polyline points="40,43 44,47 52,37" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom accent bar -->
    <rect x="15" y="78" width="60" height="4" rx="2" fill="#5eead4" opacity=".7"/>
  </g>

  <!-- Wordmark: My Virtual Project / Coordinator -->
  <text x="260" y="44" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" letter-spacing="0" fill="#134e4a">
    <tspan fill="#0d9488">My</tspan><tspan fill="#134e4a"> Virtual Project</tspan>
  </text>
  <text x="260" y="84" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="#134e4a">
    Coordinator
  </text>

  <!-- Accent underline -->
  <rect x="150" y="94" width="220" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity=".6"/>
</svg>
