<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Background -->
  <circle cx="200" cy="100" r="75" fill="#10b981" opacity=".05"/>
  <!-- Envelope -->
  <rect x="120" y="60" width="160" height="100" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <path d="M122 62l78 55 78-55" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#eff6ff" opacity=".5"/>
  <!-- Letter/paper -->
  <rect x="155" y="90" width="90" height="50" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="165" y="100" width="50" height="4" rx="2" fill="#2563eb" opacity=".3"/>
  <rect x="165" y="110" width="65" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="165" y="120" width="40" height="4" rx="2" fill="#e2e8f0"/>
  <!-- Send icon -->
  <circle cx="320" cy="60" r="18" fill="#10b981" opacity=".12"/>
  <path d="M312 60l16-6-6 16-4-8z" fill="#10b981"/>
  <path d="M318 62l-4-8" stroke="#10b981" stroke-width="1.5"/>
  <!-- Chat bubble -->
  <rect x="50" y="80" width="50" height="35" rx="8" fill="#8b5cf6" opacity=".1" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="65" cy="95" r="3" fill="#8b5cf6" opacity=".5"/>
  <circle cx="75" cy="95" r="3" fill="#8b5cf6" opacity=".5"/>
  <circle cx="85" cy="95" r="3" fill="#8b5cf6" opacity=".5"/>
  <!-- Phone -->
  <rect x="340" y="110" width="30" height="55" rx="6" fill="#fff" stroke="#f97316" stroke-width="1.5"/>
  <rect x="346" y="120" width="18" height="28" rx="2" fill="#fff7ed"/>
  <circle cx="355" cy="155" r="3" fill="#f97316" opacity=".4"/>
</svg>
